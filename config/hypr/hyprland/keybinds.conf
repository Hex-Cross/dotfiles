##! Apps
bind = Super, Return, exec, kitty
bind = Super, E, exec, thunar
bind = Super, B, exec, zen-browser
bind = Super, C, exec, code
bind = Super, R, exec, rofi -show combi -combi-modes "drun,run" -show-icons

##! Window
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow
bind = Super, Left, movefocus, l
bind = Super, Right, movefocus, r
bind = Super, Up, movefocus, u
bind = Super, Down, movefocus, d
bind = Super+Shift, Left, movewindow, l
bind = Super+Shift, Right, movewindow, r
bind = Super+Shift, Up, movewindow, u
bind = Super+Shift, Down, movewindow, d
bind = Super, Q, killactive,
bind = Alt, F4, killactive,
bind = Super+Alt, Space, togglefloating,
bind = Super, M, fullscreen, 1
bind = Super, F, fullscreen, 0
binde = Super, Semicolon, layoutmsg, splitratio -0.1
binde = Super, Apostrophe, layoutmsg, splitratio +0.1

##! Workspace
bind = Super, code:10, workspace, 1
bind = Super, code:11, workspace, 2
bind = Super, code:12, workspace, 3
bind = Super, code:13, workspace, 4
bind = Super, code:14, workspace, 5
bind = Super, code:15, workspace, 6
bind = Super, code:16, workspace, 7
bind = Super, code:17, workspace, 8
bind = Super, code:18, workspace, 9
bind = Super, code:19, workspace, 10
bind = Super+Alt, code:10, movetoworkspacesilent, 1
bind = Super+Alt, code:11, movetoworkspacesilent, 2
bind = Super+Alt, code:12, movetoworkspacesilent, 3
bind = Super+Alt, code:13, movetoworkspacesilent, 4
bind = Super+Alt, code:14, movetoworkspacesilent, 5
bind = Super+Alt, code:15, movetoworkspacesilent, 6
bind = Super+Alt, code:16, movetoworkspacesilent, 7
bind = Super+Alt, code:17, movetoworkspacesilent, 8
bind = Super+Alt, code:18, movetoworkspacesilent, 9
bind = Super+Alt, code:19, movetoworkspacesilent, 10
bind = Ctrl+Super, Right, workspace, r+1
bind = Ctrl+Super, Left, workspace, r-1
bind = Super, mouse_up, workspace, +1
bind = Super, mouse_down, workspace, -1
bind = Super, S, togglespecialworkspace,
bind = Super+Alt, S, movetoworkspacesilent, special
bind = Super, Page_Down, workspace, +1
bind = Super, Page_Up, workspace, -1

##! Screenshot
bind = , Print, exec, grimblast copy area
bind = Shift, Print, exec, grimblast copy screen
bind = Ctrl, Print, exec, mkdir -p ~/Pictures/Screenshots && grimblast save area ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = Super+Shift, S, exec, grimblast copy area

##! Media
bindle = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

##! Session
bind = Super, L, exec, loginctl lock-session
bind = Super+Shift, L, exec, systemctl suspend
bind = Super, Escape, exec, bash ~/.config/ironbar/scripts/power_menu.sh

##! Zoom
binde = Super, Minus, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.3
binde = Super, Equal, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.3

##! Ironbar shortcuts
bind = Super, N, exec, bash ~/.config/ironbar/scripts/toggle_cc.sh
bind = Super, U, exec, bash ~/.config/ironbar/scripts/update_clean.sh

##! Settings
bind = Super, T, exec, bash ~/.config/ironbar/scripts/wallpaper.sh
bind = Super, I, exec, nwg-displays
